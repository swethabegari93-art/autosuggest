<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeingInfinity</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Georgia, serif;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    text-align:center;
    position:relative;
}
.dot{
    position:fixed;
    top:20px;
    left:20px;
    width:10px;
    height:10px;
    background:#444;
    border-radius:50%;
}
.top-right{
    position:fixed;
    top:20px;
    right:25px;
    font-size:18px;
    color:#444;
}
h1{
    font-size:65px;
    margin-bottom:20px;
}
.being{
    color:#a825055e;
}
.infinity{
    color:#000;
}
.tagline{
    color:#555;
    font-size:24px;
    margin-bottom:35px;
}
.search{
    width:560px;
    margin:auto;
    position:relative;
}
.search-icon{
    position:absolute;
    left:18px;
    top:25px;
    transform:translateY(-50%);
    font-size:22px;
    z-index:2;
}
.search input{
    width:100%;
    height:52px;
    border:3px solid #555;
    border-radius:35px;
    outline:none;
    font-size:20px;
    padding-left:55px;
    font-family:Georgia, serif;
}
.search input::placeholder{
    color:#555;
}
.search input:focus{
    border-color:#ff66c4;
}
#suggestions{
    list-style:none;
    width:95%;
    margin:0 auto;
    border:2px solid #777;
    border-top:none;
    background:#fff;
    display:none;
    max-height:260px;
    overflow-y:auto;
    text-align:left;
}
#suggestions li{
    padding:12px 16px;
    font-size:18px;
    color:#444;
    border-bottom:1px solid #eee;
    cursor:pointer;
}
#suggestions li:hover{
    background:#f7f7f7;
}
</style>
</head>
<body>
<div class="dot"></div>
<div class="top-right">
    ● online &nbsp; | &nbsp; 🕒 &nbsp; <span id="timeMs">- ms</span>
</div>
<div class="container">
    <h1>
        <span class="being">Being</span><span class="infinity">Infinity</span>
    </h1>
    <p class="tagline">
        One million phrases. Four Algorithms. Prefix Based Auto Suggest.
    </p>
    <div class="search">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Start Typing to search">
        <ul id="suggestions"></ul>
    </div>
</div>
<script>
const searchInput = document.getElementById("searchInput");
const suggestionsBox = document.getElementById("suggestions");
const timeMs = document.getElementById("timeMs");
async function fetchSuggestions(query) {
    try {
        const url = `https://autosuggest-backend.onrender.com/api/autosuggest?q=${encodeURIComponent(query)}&algorithm=trie&limit=10&weighted=false`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.elapsedMs !== undefined) {
            timeMs.textContent = data.elapsedMs + " ms";
        }
        showSuggestions(data.results || []);
    } catch (error) {
        console.error("Error fetching suggestions:", error);
        suggestionsBox.innerHTML = "<li>Error fetching suggestions</li>";
        suggestionsBox.style.display = "block";
    }
}
function showSuggestions(results) {
    suggestionsBox.innerHTML = "";
    if (!results.length) {
        suggestionsBox.innerHTML = "<li>No suggestions found</li>";
        suggestionsBox.style.display = "block";
        return;
    }
    results.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item.text;
        li.addEventListener("click", () => {
            searchInput.value = item.text;
            suggestionsBox.style.display = "none";
        });
        suggestionsBox.appendChild(li);
    });
    suggestionsBox.style.display = "block";
}
searchInput.addEventListener("input", () => {
    const query = searchInput.value.trim();
    if (query === "") {
        suggestionsBox.style.display = "none";
        suggestionsBox.innerHTML = "";
        timeMs.textContent = "- ms";
        return;
    }
    fetchSuggestions(query);
});
document.addEventListener("click", (e) => {
    if (!document.querySelector(".search").contains(e.target)) {
        suggestionsBox.style.display = "none";
    }
});
</script>

</body>
</html>
